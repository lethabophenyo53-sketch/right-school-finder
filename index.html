<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

.school-card {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.school-name {
  font-size: 18px;
  font-weight: bold;
}

.district {
  color: gray;
  margin-bottom: 5px;
}

.rate {
  margin: 3px 0;
}

</style>
</head>

<body>

<header>
  <h2>📚 School Performance Dashboard</h2>
</header>

<div class="container" id="schoolList"></div>

<script>

// =======================
// 📊 YOUR FULL DATA
// =======================

const schools = [
{ name:"Acudeo College Protea Glen", district:"Johannesburg Central", pass:93.23, bachelor:53.05 },
{ name:"Adelaide Tambo Secondary", district:"Johannesburg Central", pass:93.96, bachelor:14.39 },
{ name:"Allied School", district:"Johannesburg Central", pass:100, bachelor:66.67 },
{ name:"Altmont Technical High", district:"Johannesburg Central", pass:81.97, bachelor:12.39 },
{ name:"Aurora Comprehensive", district:"Johannesburg Central", pass:90.67, bachelor:34.77 },
{ name:"Basis Protea Glen", district:"Johannesburg Central", pass:97.44, bachelor:51.12 },

// ---- EKURHULENI SOUTH ----
{ name:"Alberton High School", district:"Ekurhuleni South", pass:100, bachelor:79.31 },
{ name:"Boksburg High School", district:"Ekurhuleni South", pass:91.33, bachelor:58.31 },
{ name:"Bracken High School", district:"Ekurhuleni South", pass:99.07, bachelor:67.25 },

// ---- GAUTENG NORTH ----
{ name:"Hoërskool Erasmus", district:"Gauteng North", pass:97.27, bachelor:69.27 },
{ name:"Lesedi Secondary", district:"Gauteng North", pass:87.58, bachelor:46.03 },

// ---- ADD MORE EXACT SAME WAY ----
{ name:"Hoërskool Florida", district:"Johannesburg West", pass:99.31, bachelor:81.07 },
{ name:"Hoërskool Linden", district:"Johannesburg North", pass:98.11, bachelor:94.34 },
{ name:"Pretoria Boys High School", district:"Tshwane South", pass:99.67, bachelor:89.7 },

];

// =======================
// 🧠 DISPLAY FUNCTION
// =======================

function showSchools() {

  const list = document.getElementById("schoolList");
  list.innerHTML = "";

  schools.forEach(school => {

    const card = document.createElement("div");
    card.className = "school-card";

    card.innerHTML = `
      <div class="school-name">${school.name}</div>
      <div class="district">${school.district}</div>

      <div class="rate">📊 Pass Rate: ${school.pass}%</div>
      <div class="rate">🎓 Bachelor Rate: ${school.bachelor}%</div>
    `;

    list.appendChild(card);
  });
}

showSchools();

</script>

</body>
</html>
