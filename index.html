// ============================
// 🔍 FILTER SYSTEM
// ============================

function display() {

  const district = document.getElementById("districtFilter").value;
  const pass = document.getElementById("passFilter").value;

  const list = document.getElementById("list");
  list.innerHTML = "";

  schools.forEach(s => {

    if (!s.name) return;

    if (district && s.district !== district) return;
    if (pass && s.pass < pass) return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="name">${s.name}</div>
      <div class="district">${s.district}</div>
      <div>📊 Pass: ${s.pass}%</div>
      <div>🎓 Bachelor: ${s.bachelor}%</div>
    `;

    list.appendChild(card);
  });
}

document.getElementById("districtFilter").onchange = display;
document.getElementById("passFilter").onchange = display;

display();
