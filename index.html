// =======================
// MAP
// =======================
let map = L.map('map').setView([-26.2041, 28.0473], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OpenStreetMap'
}).addTo(map);

let markers = [];
let showMap = false;

// =======================
// USER LOCATION
// =======================
let userLat = null;
let userLon = null;

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
userLat = pos.coords.latitude;
userLon = pos.coords.longitude;
alert("Location found!");
display();
});
}

// =======================
// DISTANCE FUNCTION
// =======================
function distance(lat1,lon1,lat2,lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// =======================
// NEAREST SORT
// =======================
function sortNearest(){
if(!userLat) return alert("Turn on location first!");

schools.sort((a,b)=>{
return distance(userLat,userLon,a.lat,a.lon) -
distance(userLat,userLon,b.lat,b.lon);
});

display();
}

// =======================
// FAVORITES
// =======================
let favs = [];

function toggleFav(id){
if(favs.includes(id)){
favs = favs.filter(x=>x!==id);
} else {
favs.push(id);
}
display();
}

// =======================
// MAP TOGGLE
// =======================
function toggleMap(){
showMap = !showMap;
document.getElementById("map").style.display = showMap?"block":"none";
document.getElementById("list").style.display = showMap?"none":"block";
setTimeout(()=>map.invalidateSize(),200);
}

// =======================
// DISPLAY
// =======================
function display(){

const list = document.getElementById("list");
list.innerHTML = "";

// clear markers
markers.forEach(m=>map.removeLayer(m));
markers = [];

const search = document.getElementById("search").value.toLowerCase();
const district = document.getElementById("district").value;
const pass = document.getElementById("pass").value;

schools.forEach(s=>{

if(search && !s.name.toLowerCase().includes(search)) return;
if(district && s.district !== district) return;
if(pass && s.pass < pass) return;

let distText = "";

if(userLat){
distText = `📍 ${distance(userLat,userLon,s.lat,s.lon).toFixed(1)} km away`;
}

const isFav = favs.includes(s.id);

// CARD
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>${s.name}</h3>
<p>${s.district}</p>
<p>Pass: ${s.pass}%</p>
<p>${distText}</p>

<button onclick="openDirections(${s.lat},${s.lon})">
Directions
</button>

<button class="fav" onclick="toggleFav(${s.id})">
${isFav ? "★ Saved" : "☆ Save"}
</button>
`;

list.appendChild(card);

// MAP MARKER
let marker = L.marker([s.lat,s.lon])
.addTo(map)
.bindPopup(`<b>${s.name}</b><br>${s.pass}%`);

markers.push(marker);

});

}

// =======================
// DIRECTIONS
// =======================
function openDirections(lat,lon){
window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

// EVENTS
document.getElementById("search").oninput = display;
document.getElementById("district").onchange = display;
document.getElementById("pass").onchange = display;

display();
